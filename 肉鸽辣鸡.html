<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D霓虹射击（伤害修复版）</title>
    <style>
        body { margin: 0; overflow: hidden; background:#000; font-family:Arial; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; padding:20px; box-sizing:border-box; }
        #crosshair { position:absolute; top:50%; left:50%; width:6px; height:6px; background:#0ff; border-radius:50%; transform:translate(-50%,-50%); }
        .hud { color:#fff; font-size:22px; font-weight:bold; }
        #health-bar { width:250px; height:14px; background:#222; border:1px solid #0ff; margin-top:6px; }
        #health-fill { height:100%; width:100%; background:#0ff; transition:width 0.2s; }
        #shop { position:absolute; top:100px; right:20px; background:rgba(0,0,20,0.7); padding:12px; border:1px solid #fa0; border-radius:6px; color:#fff; }
        .shop-item { padding:6px 10px; margin:4px 0; border:1px solid #666; cursor:pointer; }
        .shop-item:hover { background:rgba(255,170,0,0.2); }
        #start { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; color:#0ff; font-size:30px; cursor:pointer; z-index:999; }
    </style>
</head>
<body>
<div id="start">点击开始游戏</div>
<div id="ui">
    <div class="hud">生命 <div id="health-bar"><div id="health-fill"></div></div></div>
    <div class="hud" style="position:absolute; top:20px; right:20px">分数: <span id="score">0</span></div>
</div>
<div id="crosshair"></div>
<div id="shop">
    <div>CYBER SHOP</div>
    <div class="shop-item" id="heal">回血 20积分</div>
    <div class="shop-item" id="updmg">伤害强化 50积分</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

let scene, camera, renderer, controls;
let health = 100, score = 0;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
let prevTime = performance.now();

const monsters = [];
let damage = 1; // 基础伤害
let lastShoot = 0;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080818);
    camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
    camera.position.y = 2;

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // 灯光
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 地板
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(200,200),
        new THREE.MeshStandardMaterial({ color:0x101020, metalness:0.8, roughness:0.2 })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // 墙
    const wallMat = new THREE.MeshStandardMaterial({ color:0x202030 });
    const w1 = new THREE.Mesh(new THREE.BoxGeometry(200,10,2), wallMat); w1.position.z=100; w1.position.y=5; scene.add(w1);
    const w2 = new THREE.Mesh(new THREE.BoxGeometry(200,10,2), wallMat); w2.position.z=-100; w2.position.y=5; scene.add(w2);
    const w3 = new THREE.Mesh(new THREE.BoxGeometry(2,10,200), wallMat); w3.position.x=100; w3.position.y=5; scene.add(w3);
    const w4 = new THREE.Mesh(new THREE.BoxGeometry(2,10,200), wallMat); w4.position.x=-100; w4.position.y=5; scene.add(w4);

    // 控制
    controls = new PointerLockControls(camera, document.body);
    document.getElementById('start').onclick = () => { controls.lock(); };
    controls.addEventListener('lock', () => { document.getElementById('start').style.display = 'none'; });
    controls.addEventListener('unlock', () => { document.getElementById('start').style.display = 'flex'; });

    // 输入
    document.addEventListener('keydown', e => {
        switch(e.code){
            case 'KeyW': moveForward=true; break;
            case 'KeyS': moveBackward=true; break;
            case 'KeyA': moveLeft=true; break;
            case 'KeyD': moveRight=true; break;
        }
    });
    document.addEventListener('keyup', e => {
        switch(e.code){
            case 'KeyW': moveForward=false; break;
            case 'KeyS': moveBackward=false; break;
            case 'KeyA': moveLeft=false; break;
            case 'KeyD': moveRight=false; break;
        }
    });

    // 射击
    document.addEventListener('mousedown', () => {
        if(!controls.isLocked) return;
        const now = performance.now();
        if(now - lastShoot < 200) return;
        lastShoot = now;
        shoot();
    });

    // 商店
    document.getElementById('heal').onclick = () => {
        if(score >=20 && health <100){ health=Math.min(health+30,100); score-=20; updateUI(); }
    };
    document.getElementById('updmg').onclick = () => {
        if(score >=50){ damage += 0.5; score -=50; updateUI(); }
    };

    // 刷怪
    setInterval(() => {
        if(controls.isLocked) spawnMonster();
    }, 1500);
}

// 射击（已修复伤害）
function shoot() {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);

    const intersects = ray.intersectObjects(monsters);
    if(intersects.length >0){
        const hit = intersects[0].object.parent;
        hit.userData.hp -= damage;
        if(hit.userData.hp <=0){
            scene.remove(hit);
            monsters.splice(monsters.indexOf(hit), 1);
            score +=10;
            updateUI();
        }
    }
}

// 生成怪物（带血量）
function spawnMonster() {
    const group = new THREE.Group();
    const type = Math.random() <0.5 ? 1 : (Math.random()<0.7 ? 2 :3);
    const hp = type===1 ? 2 : type===2 ?4 :8;
    const color = type===1 ? 0xff3366 : type===2 ? 0x33ffaa : 0xff9900;
    const s = type===1 ?1 : type===2 ?1.3 :1.8;

    group.userData = { hp, speed:3 + type*0.7 };

    const body = new THREE.Mesh(
        new THREE.SphereGeometry(s,12,12),
        new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:0.5 })
    );
    body.position.y = s;
    group.add(body);

    let x,z;
    do{
        x=(Math.random()-0.5)*180;
        z=(Math.random()-0.5)*180;
    }while(Math.hypot(x-camera.position.x, z-camera.position.z) <25);

    group.position.set(x,0,z);
    scene.add(group);
    monsters.push(group);
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('health-fill').style.width = health+'%';
}

function takeDamage(amt) {
    health -= amt;
    if(health <=0) health=0;
    updateUI();
    if(health <=0){
        controls.unlock();
        document.getElementById('start').innerHTML = '游戏结束<br>分数：'+score+'<br>点击重开';
        document.getElementById('start').style.display = 'flex';
    }
}

function animate() {
    requestAnimationFrame(animate);
    const time = performance.now();
    const delta = Math.min((time-prevTime)/1000, 0.1);
    prevTime = time;

    if(controls.isLocked){
        velocity.x *= 0.8;
        velocity.z *= 0.8;
        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if(moveForward||moveBackward) velocity.z -= direction.z * 120 * delta;
        if(moveLeft||moveRight) velocity.x -= direction.x * 120 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);
    }

    // 怪物移动
    monsters.forEach(m => {
        const dir = new THREE.Vector3().subVectors(camera.position, m.position);
        dir.y=0;
        dir.normalize();
        m.position.addScaledVector(dir, m.userData.speed * delta);

        if(m.position.distanceTo(camera.position) <2){
            takeDamage(10);
            scene.remove(m);
            monsters.splice(monsters.indexOf(m),1);
        }
    });

    renderer.render(scene,camera);
}
</script>
</body>
</html>
